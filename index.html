<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <!-- 文件編碼與響應式設定 -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>王小明 | 精準金屬加工股份有限公司</title>
  <meta name="description" content="精準金屬加工股份有限公司業務經理王小明的數位名片。CNC銑削、車床加工、金屬表面處理、雷射切割。">

  <!-- Google Fonts：Bree Serif、Saira、Noto Serif TC、Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;600;700&family=Saira:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- 名片系統樣式 -->
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <!-- 名片舞台 -->
  <main class="card-stage" aria-label="數位名片">
    <article class="nameplate" id="nameplate">
      <!-- 四角 CNC 定位標記 -->
      <span class="np-tick np-tick-tl" aria-hidden="true"></span>
      <span class="np-tick np-tick-tr" aria-hidden="true"></span>
      <span class="np-tick np-tick-bl" aria-hidden="true"></span>
      <span class="np-tick np-tick-br" aria-hidden="true"></span>

      <!-- 主體：不對稱雙欄 -->
      <div class="np-grid">
        <!-- 左欄：姓名銘牌（視覺重心） -->
        <header class="np-identity">
          <p class="np-mark" aria-hidden="true">NAME PLATE</p>
          <h1 class="np-name" id="cardName"></h1>
          <p class="np-role"><span id="cardTitle"></span> · <span id="cardCompany"></span></p>
        </header>

        <!-- 右欄：聯絡規格表 -->
        <section class="np-spec" aria-label="聯絡方式">
          <ol class="np-spec-list">
            <li class="np-spec-row" data-key="phone">
              <span class="np-spec-no">01</span>
              <span class="np-spec-key">電話</span>
              <a class="np-spec-val" id="cardPhone" href="#"></a>
            </li>
            <li class="np-spec-row" data-key="fax">
              <span class="np-spec-no">02</span>
              <span class="np-spec-key">傳真</span>
              <span class="np-spec-val" id="cardFax"></span>
            </li>
            <li class="np-spec-row" data-key="email">
              <span class="np-spec-no">03</span>
              <span class="np-spec-key">信箱</span>
              <a class="np-spec-val" id="cardEmail" href="#"></a>
            </li>
            <li class="np-spec-row" data-key="line_id">
              <span class="np-spec-no">04</span>
              <span class="np-spec-key">Line</span>
              <span class="np-spec-val" id="cardLineId"></span>
            </li>
            <li class="np-spec-row" data-key="tax_id">
              <span class="np-spec-no">05</span>
              <span class="np-spec-key">統編</span>
              <span class="np-spec-val" id="cardTaxId"></span>
            </li>
          </ol>
        </section>
      </div>

      <!-- 服務項目：横向規格帶 -->
      <section class="np-services" aria-label="服務項目">
        <p class="np-services-mark" aria-hidden="true">PROCESSING</p>
        <ul class="np-services-list" id="cardServicesList">
        </ul>
      </section>

      <!-- 行動區 -->
      <footer class="np-actions">
        <a class="btn btn-primary" id="actionCall" href="#" role="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          撥打電話
        </a>
        <a class="btn btn-ghost" id="actionEmail" href="#" role="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          寄送郵件
        </a>
      </footer>
    </article>
  </main>

  <!-- 載入通用工具與名片邏輯（不再使用 API，由 main.js 讀取 mock-data.json） -->
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
